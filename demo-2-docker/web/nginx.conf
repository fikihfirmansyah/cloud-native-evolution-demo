# Konfigurasi nginx untuk serve static files hasil build Svelte.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: semua path yang bukan file → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache asset ber-hash agresif (nama file berubah tiap build)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
