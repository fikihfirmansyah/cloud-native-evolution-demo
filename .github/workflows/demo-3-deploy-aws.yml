# =============================================================
# Demo 3 — Deploy ke AWS (ECS Fargate + S3/CloudFront).
#
# PERHATIKAN: build context = demo-2-docker/ — kode aplikasi
# demo-3 adalah kode demo-2, TANPA modifikasi. Itu poin utamanya.
#
# Secrets yang dibutuhkan (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID       — access key IAM user demo
#   AWS_SECRET_ACCESS_KEY   — secret key-nya
#   (Untuk produksi: pakai OIDC role, bukan access key statis.
#    Untuk demo sekali pakai, access key user IAM khusus cukup —
#    hapus user-nya setelah acara.)
#
# Variables (nilai dari `terraform output` setelah apply):
#   AWS_REGION              — ap-southeast-1
#   ECR_REPOSITORY_URL      — output ecr_repository_url
#   ECS_CLUSTER             — output ecs_cluster_name
#   ECS_SERVICE             — output ecs_service_name
#   S3_BUCKET_WEB           — output s3_bucket_web
#   CLOUDFRONT_DIST_ID      — output cloudfront_distribution_id
# =============================================================
name: "Demo 3 - Deploy AWS"

on:
  push:
    branches: [main]
    paths:
      - "demo-2-docker/api/**" # source aplikasi = demo-2!
      - "demo-2-docker/web/**"
      - "shared/**"
      - ".github/workflows/demo-3-deploy-aws.yml"
  workflow_dispatch: # dipicu manual saat demo

permissions:
  contents: read

jobs:
  # ---------- Backend: image API → ECR → rolling deploy ECS ----------
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Tentukan versi dari git SHA
        id: ver
        run: echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Konfigurasi kredensial AWS
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login ke ECR
        uses: aws-actions/amazon-ecr-login@b040164c4934333d597f3f9c67502ff28f814e9c # v2.1.6

      # Dockerfile & source SAMA dengan demo-2 — hanya registry
      # tujuannya yang beda (ECR, bukan GHCR).
      - name: Build & push image API ke ECR
        env:
          ECR_REPO: ${{ vars.ECR_REPOSITORY_URL }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          docker build \
            --build-arg VERSION="$VERSION" \
            -t "$ECR_REPO:latest" \
            -t "$ECR_REPO:$VERSION" \
            demo-2-docker/api
          docker push "$ECR_REPO:latest"
          docker push "$ECR_REPO:$VERSION"

      # ECS menarik :latest yang baru dan melakukan rolling deploy:
      # task baru naik dulu (200%), sehat, baru task lama diturunkan.
      - name: Rolling deploy ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --force-new-deployment
          echo "Menunggu deployment stabil..."
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}"
          echo "Deploy selesai. Versi: ${{ steps.ver.outputs.version }}"

  # ---------- Frontend: build Svelte → S3 → invalidate CloudFront ----------
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      # Frontend yang SAMA dengan demo-2 — bedanya cuma nilai
      # VITE_API_BASE. Di sini KOSONG (same-origin): CloudFront
      # meneruskan /api/* ke ALB, jadi frontend cukup fetch relatif.
      - name: Build Svelte
        working-directory: demo-2-docker/web
        env:
          VITE_API_BASE: ""
        run: |
          npm ci
          npm run build

      - name: Konfigurasi kredensial AWS
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync ke S3 + invalidate CloudFront
        run: |
          aws s3 sync demo-2-docker/web/dist "s3://${{ vars.S3_BUCKET_WEB }}" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DIST_ID }}" \
            --paths "/*"
